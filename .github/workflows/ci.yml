name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: exchangeapp_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: Exchangeapp_backend/go.sum

      - name: Build
        working-directory: Exchangeapp_backend
        run: go build ./...

      - name: Test
        working-directory: Exchangeapp_backend
        env:
          JWT_SECRET: test-secret-key-for-ci
          DB_DSN: "root:test@tcp(127.0.0.1:3306)/exchangeapp_test?charset=utf8mb4&parseTime=True&loc=Local"
          REDIS_ADDR: "localhost:6379"
        run: go test -race ./...

      - name: Vet
        working-directory: Exchangeapp_backend
        run: go vet ./...

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Exchangeapp_frontend/package-lock.json

      - name: Install dependencies
        working-directory: Exchangeapp_frontend
        run: npm ci

      - name: Type check
        working-directory: Exchangeapp_frontend
        run: npx vue-tsc --noEmit

      - name: Test
        working-directory: Exchangeapp_frontend
        run: npm test

      - name: Build
        working-directory: Exchangeapp_frontend
        run: npm run build
