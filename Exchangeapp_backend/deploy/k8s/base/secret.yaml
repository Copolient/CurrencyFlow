apiVersion: v1
kind: Secret
metadata:
  name: exchangeapp-secrets
  namespace: exchangeapp
  labels:
    app.kubernetes.io/name: exchangeapp
type: Opaque
stringData:
  jwt-secret: "CHANGE_ME_IN_PRODUCTION"
  db-dsn: "root:CHANGE_ME@tcp(mysql.database.svc.cluster.local:3306)/exchangeapp?charset=utf8mb4&parseTime=True&loc=Local"
