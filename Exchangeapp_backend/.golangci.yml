run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gofmt
    - goimports
    - misspell
    - bodyclose
    - nilerr
    - errorlint

linters-settings:
  errorlint:
    errorf: true
    asserts: true
    comparison: true
  misspell:
    locale: US

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
