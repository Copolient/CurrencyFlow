name: Build, Test & Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/exchangeapp

permissions:
  contents: read
  packages: write
  id-token: write    # OIDC for ArgoCD

jobs:
  # ============================================================
  # Job 1：单元测试 + Lint
  # ============================================================
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: Exchangeapp_backend

      - name: Run tests
        working-directory: Exchangeapp_backend
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: Exchangeapp_backend/coverage.out

  # ============================================================
  # Job 2：构建 + 推送镜像
  # ============================================================
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # main 分支 → sha-abc1234
            type=sha,prefix=sha-,format=short
            # tag → v1.2.3
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # 每次 main 推送 → latest
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: Exchangeapp_backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ============================================================
  # Job 3：更新 K8s 配置库（触发 ArgoCD 同步）
  # ============================================================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/exchangeapp-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tag
        run: |
          cd gitops
          # 获取短 SHA 作为 tag
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)

          # 如果是 tag 触发，使用 semver
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            TAG="v${VERSION}"
          else
            TAG="sha-${SHORT_SHA}"
          fi

          # 使用 kustomize 或 yq 更新镜像 tag
          cd environments/production
          kustomize edit set image \
            exchangeapp=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}

      - name: Commit and push
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || \
            git commit -m "chore: update exchangeapp image to ${{ github.sha }}" && \
            git push
